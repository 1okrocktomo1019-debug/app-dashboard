<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1App-store preview</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: #f5f6fa; color: #2d2d2d; min-height: 100vh;
    }

    /* ヘッダー */
    header {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 60%, #0f3460 100%);
      color: #fff;
      padding: 1.6rem 2rem;
    }
    .header-inner {
      max-width: 1100px; margin: 0 auto;
      display: flex; align-items: center; gap: 1.4rem;
    }
    .tiktok-icon-circle {
      flex-shrink: 0;
      width: 64px; height: 64px; border-radius: 50%;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(0,0,0,0.5);
    }
    .tiktok-icon-circle svg { display: block; }

    .header-body {
      flex: 1;
    }
    .header-body h1 {
      font-size: 1.7rem; font-weight: 800; letter-spacing: -0.01em;
      line-height: 1.1;
    }
    .header-body p {
      font-size: 0.85rem; opacity: 0.6; margin-top: 0.2rem;
    }
    .tiktok-follow-btn {
      display: inline-flex; align-items: center; gap: 0.5rem;
      margin-top: 0.8rem;
      background: linear-gradient(90deg, #fe2c55, #ff5080);
      color: #fff;
      border: none; border-radius: 999px;
      padding: 0.5rem 1.3rem;
      font-size: 0.9rem; font-weight: 700;
      cursor: pointer;
      box-shadow: 0 3px 12px rgba(254,44,85,0.45);
      text-decoration: none;
    }
    .tiktok-follow-btn svg { width: 16px; height: 16px; }

    /* 検索 */
    main { max-width: 1100px; margin: 2rem auto; padding: 0 1.5rem; }
    .search-wrap { margin-bottom: 1.5rem; }
    #search {
      width: 100%; max-width: 360px; padding: 0.55rem 1rem;
      border: 1.5px solid #dde1ea; border-radius: 999px;
      font-size: 0.9rem; background: #fff; color: #2d2d2d; outline: none;
    }

    /* グリッド */
    .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 2rem 1rem; }
    .card-wrapper { position: relative; display: flex; flex-direction: column; align-items: center; }
    .fav-btn {
      position: absolute; top: -6px; right: calc(50% - 46px);
      width: 24px; height: 24px; border: none;
      background: rgba(255,255,255,0.9); border-radius: 50%;
      font-size: 13px; cursor: pointer; color: #ccc;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 1px 4px rgba(0,0,0,0.15); z-index: 1;
    }
    .fav-btn.active { color: #f5a623; }

    .card {
      text-decoration: none; color: inherit;
      display: flex; flex-direction: column; align-items: center; gap: 0.5rem;
    }
    .icon-wrap {
      width: 72px; height: 72px; border-radius: 18px; overflow: hidden;
      display: flex; align-items: center; justify-content: center;
      box-shadow:
        0 6px 14px rgba(0,0,0,0.18),
        0 2px 4px rgba(0,0,0,0.10),
        inset 0 1px 0 rgba(255,255,255,0.25);
    }
    .icon-wrap svg { display: block; }
    .icon-placeholder {
      width: 72px; height: 72px; border-radius: 18px;
      background: #dde1ea;
    }
    .card h2 {
      font-size: 0.75rem; font-weight: 600; text-align: center;
      line-height: 1.3; max-width: 80px;
    }
    .card p {
      font-size: 0.65rem; color: #888; text-align: center;
      line-height: 1.3; max-width: 80px;
    }
  </style>
</head>
<body>
  <header>
    <div class="header-inner">
      <!-- TikTokアイコン（円形） -->
      <div class="tiktok-icon-circle">
        <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 200 200">
          <circle cx="100" cy="100" r="100" fill="#0a0a0a"/>
          <circle cx="100" cy="100" r="98" fill="none" stroke="#333" stroke-width="2"/>
          <text x="100" y="94" text-anchor="middle"
            font-family="'Hiragino Mincho ProN','Yu Mincho',Georgia,serif"
            font-size="36" font-weight="900" letter-spacing="3" fill="#fff">1日</text>
          <text x="100" y="127" text-anchor="middle"
            font-family="'Hiragino Mincho ProN','Yu Mincho',Georgia,serif"
            font-size="36" font-weight="900" letter-spacing="3" fill="#fff">1App</text>
        </svg>
      </div>
      <!-- タイトル＋フォローボタン -->
      <div class="header-body">
        <h1>1App-store</h1>
        <p>フォローよろしくおねがいします！</p>
        <a class="tiktok-follow-btn" href="https://www.tiktok.com/@1day_1app?is_from_webapp=1&sender_device=pc" target="_blank">
          <!-- TikTok音符アイコン（SVG） -->
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M19.59 6.69a4.83 4.83 0 01-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 01-2.88 2.5 2.89 2.89 0 01-2.89-2.89 2.89 2.89 0 012.89-2.89c.28 0 .54.04.79.1V9.01a6.33 6.33 0 00-.79-.05 6.34 6.34 0 00-6.34 6.34 6.34 6.34 0 006.34 6.34 6.34 6.34 0 006.33-6.34V8.69a8.18 8.18 0 004.78 1.52V6.76a4.85 4.85 0 01-1.01-.07z"/>
          </svg>
          TikTokをフォロー
        </a>
      </div>
    </div>
  </header>

  <main>
    <div class="search-wrap">
      <input type="search" id="search" placeholder="アプリを検索...">
    </div>
    <div class="grid">

      <!-- チャイドル：ハンガー＋ドレスアイコン -->
      <div class="card-wrapper">
        <button class="fav-btn active">★</button>
        <a class="card" href="#">
          <div class="icon-wrap">
            <svg width="72" height="72" viewBox="0 0 72 72" xmlns="http://www.w3.org/2000/svg">
              <defs>
                <linearGradient id="g-chaidol" x1="0" y1="0" x2="1" y2="1">
                  <stop offset="0%" stop-color="#ff9de2"/>
                  <stop offset="100%" stop-color="#c77dff"/>
                </linearGradient>
              </defs>
              <rect width="72" height="72" rx="18" fill="url(#g-chaidol)"/>
              <!-- ハンガー -->
              <path d="M36 18 C36 18 36 15 39 15 C42 15 42 18 39 20 L36 22" stroke="white" stroke-width="2.2" fill="none" stroke-linecap="round"/>
              <path d="M17 44 L36 22 L55 44" stroke="white" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
              <line x1="15" y1="44" x2="57" y2="44" stroke="white" stroke-width="2.4" stroke-linecap="round"/>
              <!-- ドレス -->
              <path d="M27 46 L24 60 L36 56 L48 60 L45 46 Z" fill="white" opacity="0.92"/>
              <path d="M27 46 Q36 50 45 46" stroke="white" stroke-width="1.5" fill="none"/>
            </svg>
          </div>
          <h2>チャイドル</h2>
          <p>子供用バーチャル試着アプリ</p>
        </a>
      </div>

      <!-- X→Threads：矢印変換アイコン -->
      <div class="card-wrapper">
        <button class="fav-btn">★</button>
        <a class="card" href="#">
          <div class="icon-wrap">
            <svg width="72" height="72" viewBox="0 0 72 72" xmlns="http://www.w3.org/2000/svg">
              <defs>
                <linearGradient id="g-threads" x1="0" y1="0" x2="1" y2="1">
                  <stop offset="0%" stop-color="#4facfe"/>
                  <stop offset="100%" stop-color="#7367f0"/>
                </linearGradient>
              </defs>
              <rect width="72" height="72" rx="18" fill="url(#g-threads)"/>
              <!-- X文字 -->
              <line x1="20" y1="22" x2="33" y2="36" stroke="white" stroke-width="3" stroke-linecap="round"/>
              <line x1="33" y1="22" x2="20" y2="36" stroke="white" stroke-width="3" stroke-linecap="round"/>
              <!-- 矢印 -->
              <path d="M34 29 L38 29 L38 26 L44 31 L38 36 L38 33 L34 33 Z" fill="white" opacity="0.9"/>
              <!-- Threadsの∞風マーク -->
              <path d="M48 39 C48 36 45 34 43 36 C41 38 43 42 46 42 C49 42 51 39 49 36 C47 33 44 34 44 37" stroke="white" stroke-width="2.2" fill="none" stroke-linecap="round"/>
              <circle cx="44" cy="47" r="2" fill="white" opacity="0.8"/>
            </svg>
          </div>
          <h2>X→Threads</h2>
          <p>投稿変換ツール</p>
        </a>
      </div>

      <!-- フォーム送信：ドキュメント＋送信アイコン -->
      <div class="card-wrapper">
        <button class="fav-btn">★</button>
        <a class="card" href="#">
          <div class="icon-wrap">
            <svg width="72" height="72" viewBox="0 0 72 72" xmlns="http://www.w3.org/2000/svg">
              <defs>
                <linearGradient id="g-form" x1="0" y1="0" x2="1" y2="1">
                  <stop offset="0%" stop-color="#43e97b"/>
                  <stop offset="100%" stop-color="#0cbbdd"/>
                </linearGradient>
              </defs>
              <rect width="72" height="72" rx="18" fill="url(#g-form)"/>
              <!-- ドキュメント -->
              <rect x="18" y="16" width="26" height="34" rx="3" fill="white" opacity="0.9"/>
              <line x1="23" y1="24" x2="39" y2="24" stroke="#43e97b" stroke-width="2" stroke-linecap="round"/>
              <line x1="23" y1="30" x2="39" y2="30" stroke="#43e97b" stroke-width="2" stroke-linecap="round"/>
              <line x1="23" y1="36" x2="33" y2="36" stroke="#43e97b" stroke-width="2" stroke-linecap="round"/>
              <!-- 送信矢印 -->
              <circle cx="50" cy="46" r="11" fill="white" opacity="0.95"/>
              <path d="M45 46 L54 46 M50 41 L55 46 L50 51" stroke="#0cbbdd" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <h2>フォーム送信</h2>
          <p>一括送信ツール</p>
        </a>
      </div>

      <!-- 近日公開 -->
      <div class="card-wrapper">
        <button class="fav-btn">★</button>
        <a class="card" href="#">
          <div class="icon-wrap">
            <svg width="72" height="72" viewBox="0 0 72 72" xmlns="http://www.w3.org/2000/svg">
              <rect width="72" height="72" rx="18" fill="#e8eaf0"/>
              <circle cx="36" cy="32" r="10" stroke="#bbb" stroke-width="2.5" fill="none"/>
              <line x1="36" y1="26" x2="36" y2="32" stroke="#bbb" stroke-width="2.5" stroke-linecap="round"/>
              <line x1="36" y1="32" x2="40" y2="35" stroke="#bbb" stroke-width="2.5" stroke-linecap="round"/>
              <text x="36" y="52" text-anchor="middle" font-size="9" fill="#aaa" font-weight="600">COMING SOON</text>
            </svg>
          </div>
          <h2>近日公開</h2>
          <p>準備中</p>
        </a>
      </div>

      <div class="card-wrapper">
        <button class="fav-btn">★</button>
        <a class="card" href="#">
          <div class="icon-wrap">
            <svg width="72" height="72" viewBox="0 0 72 72" xmlns="http://www.w3.org/2000/svg">
              <rect width="72" height="72" rx="18" fill="#e8eaf0"/>
              <circle cx="36" cy="32" r="10" stroke="#bbb" stroke-width="2.5" fill="none"/>
              <line x1="36" y1="26" x2="36" y2="32" stroke="#bbb" stroke-width="2.5" stroke-linecap="round"/>
              <line x1="36" y1="32" x2="40" y2="35" stroke="#bbb" stroke-width="2.5" stroke-linecap="round"/>
              <text x="36" y="52" text-anchor="middle" font-size="9" fill="#aaa" font-weight="600">COMING SOON</text>
            </svg>
          </div>
          <h2>近日公開</h2>
          <p>準備中</p>
        </a>
      </div>

    </div>
  </main>
</body>
</html>
