<h2>アイコンのスタイルを選んでください</h2>
<p class="subtitle">カードデザイン（白カード・紺ヘッダー・アクセント #4f6ef7）に合わせたスタイルです</p>

<div class="cards">

  <!-- Option A: ライン（モノクローム） -->
  <div class="card" data-choice="a" onclick="toggleSelect(this)">
    <div class="card-image" style="background:#f8f9ff;padding:24px;display:flex;gap:20px;justify-content:center;align-items:center;">
      <!-- Chaidol: dress outline -->
      <svg width="52" height="52" viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="52" height="52" rx="12" fill="white" stroke="#e0e4f8" stroke-width="1.5"/>
        <path d="M20 14h12l3 8H17l3-8z" stroke="#4f6ef7" stroke-width="2" stroke-linejoin="round" fill="none"/>
        <path d="M17 22l-3 16h24l-3-16" stroke="#4f6ef7" stroke-width="2" stroke-linejoin="round" fill="none"/>
        <circle cx="26" cy="18" r="3" stroke="#4f6ef7" stroke-width="2" fill="none"/>
      </svg>
      <!-- X→Threads: arrow outline -->
      <svg width="52" height="52" viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="52" height="52" rx="12" fill="white" stroke="#e0e4f8" stroke-width="1.5"/>
        <text x="14" y="28" font-family="Arial" font-size="11" font-weight="bold" fill="#4f6ef7">X</text>
        <path d="M24 26h10m-4-4l4 4-4 4" stroke="#4f6ef7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="36" cy="26" r="6" stroke="#4f6ef7" stroke-width="1.5" fill="none"/>
        <circle cx="36" cy="23" r="1" fill="#4f6ef7"/>
        <path d="M33 26.5c0 0 1-2 3-2s3 2 3 2" stroke="#4f6ef7" stroke-width="1.2" stroke-linecap="round" fill="none"/>
      </svg>
      <!-- Form: envelope outline -->
      <svg width="52" height="52" viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="52" height="52" rx="12" fill="white" stroke="#e0e4f8" stroke-width="1.5"/>
        <rect x="13" y="18" width="26" height="18" rx="3" stroke="#4f6ef7" stroke-width="2" fill="none"/>
        <path d="M13 21l13 9 13-9" stroke="#4f6ef7" stroke-width="2" stroke-linecap="round"/>
        <path d="M36 30l4 4" stroke="#4f6ef7" stroke-width="2" stroke-linecap="round"/>
        <circle cx="38" cy="35" r="3" fill="#4f6ef7"/>
      </svg>
    </div>
    <div class="card-body">
      <h3>A. ラインアイコン（モノクローム）</h3>
      <p>白背景 + #4f6ef7 のアウトラインのみ。カードデザインに自然になじむシンプルスタイル。</p>
    </div>
  </div>

  <!-- Option B: フィルド（アプリ別カラー） -->
  <div class="card" data-choice="b" onclick="toggleSelect(this)">
    <div class="card-image" style="background:#f8f9ff;padding:24px;display:flex;gap:20px;justify-content:center;align-items:center;">
      <!-- Chaidol: pink dress filled -->
      <svg width="52" height="52" viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="52" height="52" rx="12" fill="#fce4f0"/>
        <path d="M20 14h12l3 8H17l3-8z" fill="#e8639a"/>
        <path d="M17 22l-3 16h24l-3-16" fill="#f093c0"/>
        <circle cx="26" cy="18" r="3" fill="#e8639a"/>
      </svg>
      <!-- X→Threads: blue filled -->
      <svg width="52" height="52" viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="52" height="52" rx="12" fill="#e8eeff"/>
        <text x="13" y="29" font-family="Arial" font-size="13" font-weight="bold" fill="#4f6ef7">X</text>
        <path d="M24 26h10m-4-4l4 4-4 4" stroke="#4f6ef7" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="36" cy="26" r="6" fill="#4f6ef7"/>
        <circle cx="36" cy="23.5" r="1" fill="white"/>
        <path d="M33.5 27c0 0 1-1.5 2.5-1.5s2.5 1.5 2.5 1.5" stroke="white" stroke-width="1.2" stroke-linecap="round" fill="none"/>
      </svg>
      <!-- Form: green filled -->
      <svg width="52" height="52" viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="52" height="52" rx="12" fill="#e3f5ed"/>
        <rect x="13" y="18" width="26" height="18" rx="3" fill="#38b67a"/>
        <path d="M13 21l13 9 13-9" stroke="white" stroke-width="2" stroke-linecap="round"/>
        <circle cx="37" cy="34" r="5" fill="#22854f"/>
        <path d="M35 34l1.5 1.5 2.5-2.5" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="card-body">
      <h3>B. カラーフィルドアイコン（アプリ別カラー）</h3>
      <p>各アプリに専用カラー（ピンク・青・緑など）。カードに色の個性が加わり識別しやすくなる。</p>
    </div>
  </div>

  <!-- Option C: グラデーション -->
  <div class="card" data-choice="c" onclick="toggleSelect(this)">
    <div class="card-image" style="background:#f8f9ff;padding:24px;display:flex;gap:20px;justify-content:center;align-items:center;">
      <!-- Chaidol: gradient dress -->
      <svg width="52" height="52" viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="gA" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#f093c0"/>
            <stop offset="100%" stop-color="#a855f7"/>
          </linearGradient>
        </defs>
        <rect width="52" height="52" rx="12" fill="url(#gA)"/>
        <path d="M20 14h12l3 8H17l3-8z" fill="rgba(255,255,255,0.5)"/>
        <path d="M17 22l-3 16h24l-3-16" fill="rgba(255,255,255,0.8)"/>
        <circle cx="26" cy="18" r="3" fill="white"/>
      </svg>
      <!-- X→Threads: gradient -->
      <svg width="52" height="52" viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="gB" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#4f6ef7"/>
            <stop offset="100%" stop-color="#06b6d4"/>
          </linearGradient>
        </defs>
        <rect width="52" height="52" rx="12" fill="url(#gB)"/>
        <text x="11" y="30" font-family="Arial" font-size="14" font-weight="bold" fill="white">X</text>
        <path d="M24 26h10m-4-4l4 4-4 4" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="36" cy="26" r="5.5" fill="rgba(255,255,255,0.25)"/>
      </svg>
      <!-- Form: gradient -->
      <svg width="52" height="52" viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="gC" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#34d399"/>
            <stop offset="100%" stop-color="#059669"/>
          </linearGradient>
        </defs>
        <rect width="52" height="52" rx="12" fill="url(#gC)"/>
        <rect x="13" y="18" width="26" height="18" rx="3" fill="rgba(255,255,255,0.85)"/>
        <path d="M13 21l13 9 13-9" stroke="#059669" stroke-width="2" stroke-linecap="round"/>
        <circle cx="37" cy="34" r="5" fill="#059669"/>
        <path d="M35 34l1.5 1.5 2.5-2.5" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="card-body">
      <h3>C. グラデーション背景アイコン</h3>
      <p>カラフルなグラデーション背景 + 白アイコン。プレミアム感があり、各アプリの個性を強調。</p>
    </div>
  </div>

</div>
