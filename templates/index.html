<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1App room</title>
  <link rel="apple-touch-icon" href="{{ url_for('static', filename='icons/1nichi1app-icon.svg') }}">
  <link rel="icon" href="{{ url_for('static', filename='icons/1nichi1app-icon.svg') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

  <header>
    <!-- アイコン -->
    <div class="header-icon">
      <img src="{{ url_for('static', filename='icons/1app-icon.svg') }}" alt="1日1App">
    </div>
    <!-- ロゴ -->
    <div class="logo">
      <span class="logo-text"><span class="logo-one">1</span>App</span>
      <span class="logo-text">room</span>
    </div>
    <!-- フォロー -->
    <p class="header-follow">フォローよろしくおねがいします！</p>
    <!-- TikTokリンク -->
    <a class="header-tiktok-link" href="https://www.tiktok.com/@1day_1app" target="_blank" rel="noopener">
      <div class="tiktok-logo-wrap">
        <svg class="tiktok-logo" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-2.88 2.5 2.89 2.89 0 0 1-2.89-2.89 2.89 2.89 0 0 1 2.89-2.89c.28 0 .54.04.79.1V9.01a6.33 6.33 0 0 0-.79-.05 6.34 6.34 0 0 0-6.34 6.34 6.34 6.34 0 0 0 6.34 6.34 6.34 6.34 0 0 0 6.33-6.34V8.69a8.18 8.18 0 0 0 4.78 1.52V6.75a4.85 4.85 0 0 1-1.01-.06z"/>
        </svg>
      </div>
      @1day_1app をフォロー
    </a>
  </header>

  <main>
    <div class="grid">
      {% for app in apps %}
      <a class="card" href="{{ app.url }}" target="_blank" rel="noopener noreferrer">
        <div class="icon-wrap">
          {% if app.icon %}
          <img src="{{ url_for('static', filename='icons/' + app.icon) }}" alt="{{ app.name }}">
          {% else %}
          <div class="icon-placeholder"></div>
          {% endif %}
        </div>
        <h2>{{ app.name }}</h2>
        <p>{{ app.description }}</p>
      </a>
      {% endfor %}
    </div>
  </main>

</body>
</html>
