<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1App -store</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <header>
    <h1>1App -store</h1>
    <p>1日一アプリをアップデートする。フォローよろしくおねがいします！</p>
  </header>

  <main>
    <div class="grid">
      {% for app in apps %}
      <a class="card" href="{{ app.url }}" target="_blank" rel="noopener noreferrer">
        <div class="icon-wrap">
          {% if app.icon %}
          <img src="{{ url_for('static', filename='icons/' + app.icon) }}" alt="{{ app.name }}">
          {% else %}
          <div class="icon-placeholder"></div>
          {% endif %}
        </div>
        <h2>{{ app.name }}</h2>
        <p>{{ app.description }}</p>
        <span class="link">開く →</span>
      </a>
      {% endfor %}
    </div>
  </main>
</body>
</html>
