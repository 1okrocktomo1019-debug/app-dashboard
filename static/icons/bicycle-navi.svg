<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- 背景（角丸正方形）グリーン系 -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e0f7fa"/>
      <stop offset="100%" style="stop-color:#e8f5e9"/>
    </linearGradient>
    <linearGradient id="bike" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00897b"/>
      <stop offset="100%" style="stop-color:#00acc1"/>
    </linearGradient>
  </defs>
  <rect width="100" height="100" rx="22" fill="url(#bg)"/>

  <!-- 後輪 -->
  <circle cx="30" cy="65" r="19" fill="none" stroke="url(#bike)" stroke-width="4.5"/>
  <!-- 後輪スポーク -->
  <line x1="30" y1="46" x2="30" y2="84" stroke="url(#bike)" stroke-width="1.8" opacity="0.4"/>
  <line x1="11" y1="65" x2="49" y2="65" stroke="url(#bike)" stroke-width="1.8" opacity="0.4"/>
  <circle cx="30" cy="65" r="3.5" fill="url(#bike)"/>

  <!-- 前輪 -->
  <circle cx="70" cy="65" r="19" fill="none" stroke="url(#bike)" stroke-width="4.5"/>
  <!-- 前輪スポーク -->
  <line x1="70" y1="46" x2="70" y2="84" stroke="url(#bike)" stroke-width="1.8" opacity="0.4"/>
  <line x1="51" y1="65" x2="89" y2="65" stroke="url(#bike)" stroke-width="1.8" opacity="0.4"/>
  <circle cx="70" cy="65" r="3.5" fill="url(#bike)"/>

  <!-- フレーム：チェーンステー（後輪ハブ→BB） -->
  <line x1="30" y1="65" x2="50" y2="65" stroke="url(#bike)" stroke-width="3.5" stroke-linecap="round"/>
  <!-- フレーム：シートステー（後輪ハブ→シートチューブ上部） -->
  <line x1="30" y1="65" x2="46" y2="40" stroke="url(#bike)" stroke-width="3" stroke-linecap="round"/>
  <!-- フレーム：シートチューブ（BB→シートチューブ上部） -->
  <line x1="50" y1="65" x2="46" y2="40" stroke="url(#bike)" stroke-width="3.5" stroke-linecap="round"/>
  <!-- フレーム：ダウンチューブ（BB→ヘッドチューブ） -->
  <line x1="50" y1="65" x2="66" y2="44" stroke="url(#bike)" stroke-width="3.5" stroke-linecap="round"/>
  <!-- フレーム：トップチューブ（シートチューブ上部→ヘッドチューブ） -->
  <line x1="46" y1="40" x2="66" y2="44" stroke="url(#bike)" stroke-width="3" stroke-linecap="round"/>

  <!-- ハンドルバー -->
  <line x1="66" y1="44" x2="70" y2="65" stroke="url(#bike)" stroke-width="3" stroke-linecap="round"/>
  <line x1="62" y1="37" x2="74" y2="37" stroke="url(#bike)" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="65" y1="44" x2="65" y2="37" stroke="url(#bike)" stroke-width="3" stroke-linecap="round"/>

  <!-- サドル -->
  <line x1="38" y1="34" x2="54" y2="34" stroke="url(#bike)" stroke-width="4" stroke-linecap="round"/>
  <line x1="46" y1="34" x2="46" y2="40" stroke="url(#bike)" stroke-width="3" stroke-linecap="round"/>
</svg>
