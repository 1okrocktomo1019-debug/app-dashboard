<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" shape-rendering="crispEdges">
  <!-- Background -->
  <rect x="0" y="0" width="32" height="32" rx="7" fill="#1A1A3E"/>

  <!-- 勇者 pixel art icon (16x16 grid, 2px per cell) -->

  <!-- Helmet (silver) -->
  <rect x="8"  y="2"  width="14" height="2" fill="#AAAAAA"/>
  <rect x="6"  y="4"  width="18" height="2" fill="#AAAAAA"/>
  <rect x="6"  y="6"  width="18" height="2" fill="#AAAAAA"/>

  <!-- Face (skin) inside helmet -->
  <rect x="8"  y="6"  width="14" height="2" fill="#FFCC88"/>
  <rect x="6"  y="8"  width="18" height="2" fill="#AAAAAA"/>
  <rect x="8"  y="8"  width="14" height="2" fill="#FFCC88"/>

  <!-- Eyes -->
  <rect x="10" y="8"  width="2"  height="2" fill="#222222"/>
  <rect x="18" y="8"  width="2"  height="2" fill="#222222"/>

  <!-- Mouth area -->
  <rect x="6"  y="10" width="18" height="2" fill="#AAAAAA"/>
  <rect x="8"  y="10" width="14" height="2" fill="#FFCC88"/>
  <rect x="12" y="10" width="6"  height="2" fill="#CC8866"/>

  <!-- Chin guard -->
  <rect x="6"  y="12" width="18" height="2" fill="#999999"/>

  <!-- Armor body (blue) -->
  <rect x="4"  y="14" width="22" height="2" fill="#3355CC"/>
  <rect x="4"  y="16" width="22" height="2" fill="#3355CC"/>
  <rect x="4"  y="18" width="22" height="4" fill="#2244AA"/>

  <!-- Armor highlight -->
  <rect x="12" y="14" width="6"  height="2" fill="#5577EE"/>

  <!-- Sword (right side, gold handle + silver blade) -->
  <rect x="26" y="4"  width="2"  height="2" fill="#DDDDDD"/>
  <rect x="26" y="6"  width="2"  height="2" fill="#DDDDDD"/>
  <rect x="26" y="8"  width="2"  height="2" fill="#DDDDDD"/>
  <rect x="26" y="10" width="2"  height="2" fill="#DDDDDD"/>
  <rect x="24" y="12" width="6"  height="2" fill="#FFDD00"/>
  <rect x="26" y="14" width="2"  height="2" fill="#8B4513"/>
  <rect x="26" y="16" width="2"  height="2" fill="#8B4513"/>

  <!-- Legs -->
  <rect x="6"  y="22" width="8"  height="4" fill="#1A3399"/>
  <rect x="16" y="22" width="8"  height="4" fill="#1A3399"/>

  <!-- Boots -->
  <rect x="4"  y="26" width="10" height="4" fill="#222222"/>
  <rect x="16" y="26" width="10" height="4" fill="#222222"/>
</svg>
