<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FDBA74;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FB923C;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="mercuryGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F87171;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#DC2626;stop-opacity:1" />
    </linearGradient>
    <filter id="figShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#7C2D12" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="512" height="512" rx="102" ry="102" fill="url(#bgGrad)"/>
  <rect x="0" y="0" width="512" height="512" rx="102" ry="102" fill="white" opacity="0.05"/>

  <g filter="url(#figShadow)" transform="translate(12,0)">
    <!-- Thermometer outer (white halo) -->
    <rect x="212" y="100" width="64" height="280" rx="32" fill="white" opacity="0.95"/>
    <circle cx="244" cy="390" r="46" fill="white" opacity="0.95"/>

    <!-- Thermometer inner (black outline) -->
    <rect x="220" y="108" width="48" height="264" rx="24" fill="#1a1a1a"/>
    <circle cx="244" cy="390" r="38" fill="#1a1a1a"/>

    <!-- Mercury fill -->
    <rect x="228" y="210" width="32" height="170" rx="16" fill="url(#mercuryGrad)"/>
    <circle cx="244" cy="390" r="28" fill="url(#mercuryGrad)"/>

    <!-- Bulb shine -->
    <circle cx="234" cy="382" r="8" fill="white" opacity="0.4"/>

    <!-- Tube shine -->
    <rect x="231" y="118" width="8" height="80" rx="4" fill="white" opacity="0.35"/>
  </g>

  <!-- ZZZ (黒) -->
  <text x="292" y="210" font-family="-apple-system, 'Helvetica Neue', sans-serif"
        font-size="52" font-weight="900" fill="#1a1a1a" opacity="0.75"
        letter-spacing="-2">z</text>
  <text x="316" y="168" font-family="-apple-system, 'Helvetica Neue', sans-serif"
        font-size="40" font-weight="900" fill="#1a1a1a" opacity="0.55"
        letter-spacing="-2">z</text>
  <text x="336" y="134" font-family="-apple-system, 'Helvetica Neue', sans-serif"
        font-size="28" font-weight="900" fill="#1a1a1a" opacity="0.35"
        letter-spacing="-2">z</text>

</svg>
