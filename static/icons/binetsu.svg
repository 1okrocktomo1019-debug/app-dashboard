<svg width="120" height="120" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
    <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FDBA74"/>
      <stop offset="100%" stop-color="#FB923C"/>
    </linearGradient>
  </defs>
  <rect width="120" height="120" rx="26" fill="url(#bg)"/>

  <!-- 温度計（少し右に傾けて） -->
  <g transform="rotate(18, 60, 60) translate(0, 8)">
    <!-- 本体（管） -->
    <rect x="54" y="10" width="12" height="68" rx="6" fill="white" stroke="#e0e0e0" stroke-width="1.5"/>
    <!-- 水銀（赤い部分） -->
    <rect x="57" y="42" width="6" height="36" rx="2" fill="#ff5252"/>
    <!-- 球部 -->
    <circle cx="60" cy="86" r="12" fill="#ff5252"/>
    <circle cx="60" cy="86" r="8" fill="#ff1744"/>
    <!-- ハイライト -->
    <ellipse cx="56" cy="82" rx="3" ry="4" fill="white" opacity="0.35"/>
    <!-- 目盛り -->
    <line x1="61" y1="22" x2="65" y2="22" stroke="#bdbdbd" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="61" y1="32" x2="65" y2="32" stroke="#bdbdbd" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="61" y1="42" x2="67" y2="42" stroke="#e57373" stroke-width="2" stroke-linecap="round"/>
    <line x1="61" y1="52" x2="65" y2="52" stroke="#bdbdbd" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- 汗（右上） -->
  <ellipse cx="88" cy="28" rx="5" ry="7" fill="#90caf9" opacity="0.85" transform="rotate(-15, 88, 28)"/>
  <ellipse cx="96" cy="38" rx="3.5" ry="5" fill="#90caf9" opacity="0.7" transform="rotate(-10, 96, 38)"/>
</svg>
