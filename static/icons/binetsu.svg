<svg width="120" height="120" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
    <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FDBA74"/>
      <stop offset="100%" stop-color="#FB923C"/>
    </linearGradient>
  </defs>
  <rect width="120" height="120" rx="26" fill="url(#bg)"/>

  <!-- 温度計（少し右に傾けて） -->
  <g transform="rotate(18, 60, 60)">
    <!-- 本体（管） -->
    <rect x="52" y="18" width="16" height="56" rx="8" fill="white" stroke="#e0e0e0" stroke-width="1.5"/>
    <!-- 水銀（赤い部分） -->
    <rect x="55" y="44" width="10" height="30" rx="2" fill="#ff5252"/>
    <!-- 球部 -->
    <circle cx="60" cy="79" r="12" fill="#ff5252"/>
    <circle cx="60" cy="79" r="8" fill="#ff1744"/>
    <!-- ハイライト -->
    <ellipse cx="56" cy="75" rx="3" ry="4" fill="white" opacity="0.35"/>
    <!-- 目盛り -->
    <line x1="62" y1="30" x2="66" y2="30" stroke="#bdbdbd" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="62" y1="38" x2="66" y2="38" stroke="#bdbdbd" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="62" y1="46" x2="68" y2="46" stroke="#e57373" stroke-width="2" stroke-linecap="round"/>
    <line x1="62" y1="54" x2="66" y2="54" stroke="#bdbdbd" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- 汗（右上） -->
  <ellipse cx="88" cy="28" rx="5" ry="7" fill="#90caf9" opacity="0.85" transform="rotate(-15, 88, 28)"/>
  <ellipse cx="96" cy="38" rx="3.5" ry="5" fill="#90caf9" opacity="0.7" transform="rotate(-10, 96, 38)"/>
</svg>
