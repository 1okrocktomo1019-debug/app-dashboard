      <stop offset="0%" stop-color="#4f6ef7"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>
  <rect width="52" height="52" rx="12" fill="url(#g)"/>
  <!-- pen body -->
