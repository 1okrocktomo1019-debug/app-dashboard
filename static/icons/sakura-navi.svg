  <line x1="50" y1="44" x2="50" y2="40" stroke="#e91e8c" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="50" y1="44" x2="54" y2="41" stroke="#e91e8c" stroke-width="1.2" stroke-linecap="round"/>
