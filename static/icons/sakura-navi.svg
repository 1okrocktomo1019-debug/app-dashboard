  <circle cx="46" cy="41" r="1.2" fill="#e91e8c"/>

  <!-- 「ナビ」の位置アイコン（ピン） -->
  <ellipse cx="50" cy="78" rx="5" ry="2.5" fill="#d81b60" opacity="0.3"/>
  <path d="M50 65 C44 65 40 69 40 74 C40 80 50 88 50 88 C50 88 60 80 60 74 C60 69 56 65 50 65Z" fill="#e91e8c"/>
