<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- 背景（角丸正方形） -->
  <rect width="100" height="100" rx="22" fill="#fff7ed"/>

  <!-- メモ帳 -->
  <rect x="22" y="18" width="56" height="68" rx="8" fill="#fff" stroke="#fdba74" stroke-width="2.5"/>

  <!-- 上部クリップ -->
  <rect x="38" y="13" width="24" height="12" rx="6" fill="#fb923c"/>

  <!-- リスト行1（未チェック） -->
  <rect x="34" y="34" width="10" height="10" rx="3" fill="none" stroke="#94a3b8" stroke-width="2"/>
  <line x1="50" y1="39" x2="68" y2="39" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round"/>

  <!-- リスト行2（未チェック） -->
  <rect x="34" y="50" width="10" height="10" rx="3" fill="none" stroke="#94a3b8" stroke-width="2"/>
  <line x1="50" y1="55" x2="68" y2="55" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round"/>

  <!-- リスト行3（チェック済み・下に移動） -->
